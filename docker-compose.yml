version: "3.8"

services:
  watheeq-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watheeq-ai-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/v1/analysis/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

